      <p align="center"><strong><FONT face=Arial, Helvetica, sans-serif color=#D4B285>El halo inmarcesible de la luna, <BR>

  <BR>
  En Toboso tuviste tu alta cuna, <BR>
&iexcl;Oh preciosa y dulc&iacute;sima doncella!. <BR>
  En la Mancha dejaste tu honda huella, <BR>
  y Castilla goz&oacute; de gran fortuna. <BR>
  <BR>
  De Espa&ntilde;a eres orgullo y eres gloria, <BR>
  tierno amor del andante caballero <BR>
  Don Quijote, fermosa Dulcinea. <BR>
  <BR>
&Eacute;l lidi&oacute;, consiguiendo la victoria, <BR>
  en lucha desigual, con valor fiero, <BR>
  defendiendo tu honor en la pelea.</FONT> </strong></p>
